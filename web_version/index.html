<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>감사 일기 — 데스크톱</title>
  <style>
    :root {
      --sidebar-w: 260px;
      --bg:        #f0f2f7;
      --surface:   #ffffff;
      --surface2:  #f4f6fb;
      --border:    #e2e8f0;
      --text:      #1a202c;
      --text2:     #4a5568;
      --text3:     #718096;
      --primary:   #6c63ff;
      --primary-h: #5a52d5;
      --danger:    #e53e3e;
      --success:   #38a169;
      --shadow:    0 1px 6px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
      --radius:    12px;
      --work:      #4F86F7;
      --personal:  #F97316;
      --study:     #22C55E;
    }
    html.dark {
      --bg:        #0d0f18;
      --surface:   #161926;
      --surface2:  #1c2035;
      --border:    #272d45;
      --text:      #eef2ff;
      --text2:     #a8b2d8;
      --text3:     #6b7899;
      --shadow:    0 1px 8px rgba(0,0,0,0.35);
      --shadow-md: 0 4px 18px rgba(0,0,0,0.45);
      --shadow-lg: 0 8px 36px rgba(0,0,0,0.55);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; overflow: hidden;
    }
    button { cursor: pointer; border: none; background: none; font: inherit; }
    input, textarea, select { font: inherit; }
    ul { list-style: none; }

    /* Shell */
    .shell { display: flex; height: 100vh; min-width: 900px; }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      display: flex; flex-direction: column;
      background: var(--surface);
      border-right: 1px solid var(--border);
      box-shadow: var(--shadow); z-index: 10;
    }
    .sb-brand {
      display: flex; align-items: center; gap: 10px;
      padding: 16px 18px 14px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sb-logo { font-size: 24px; }
    .sb-title { font-size: 15px; font-weight: 700; color: var(--primary); }
    .sb-nav { display: flex; flex-direction: column; gap: 4px; padding: 8px 10px; flex-shrink: 0; }
    .sb-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 10px;
      font-size: 13px; font-weight: 600; color: var(--text2);
      text-align: left; transition: all 0.15s;
    }
    .sb-btn:hover { background: var(--surface2); color: var(--text); }
    .sb-btn.active { background: var(--primary); color: #fff; }
    .sb-divider { height: 1px; background: var(--border); margin: 0 14px; flex-shrink: 0; }

    /* Scrollable sidebar middle */
    .sb-scroll { flex: 1; overflow-y: auto; padding: 6px 0; }
    .sb-scroll::-webkit-scrollbar { width: 3px; }
    .sb-scroll::-webkit-scrollbar-track { background: transparent; }
    .sb-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .sb-widget {
      margin: 5px 10px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;
    }
    .sb-widget-title {
      font-size: 11px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 7px;
    }

    /* Clock */
    .sb-clock { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: 0.03em; line-height: 1; }
    .sb-clock-date { font-size: 10px; color: var(--text3); margin-top: 3px; }

    /* Weather */
    .sb-weather-row { display: flex; align-items: center; gap: 8px; }
    .sb-weather-icon { font-size: 24px; line-height: 1; }
    .sb-weather-info { display: flex; flex-direction: column; gap: 1px; }
    .sb-weather-temp { font-size: 17px; font-weight: 700; color: var(--text); }
    .sb-weather-desc { font-size: 10px; color: var(--text3); }
    .sb-weather-loc  { font-size: 10px; color: var(--text3); margin-top: 3px; }
    .sb-weather-msg  { font-size: 11px; color: var(--text3); }

    /* Calendar */
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .cal-nav-btn {
      width: 20px; height: 20px; border-radius: 5px; font-size: 13px;
      color: var(--text3); display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
    }
    .cal-nav-btn:hover { background: var(--border); color: var(--text); }
    .cal-month-lbl { font-size: 11px; font-weight: 700; color: var(--text); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    .cal-dh {
      text-align: center; font-size: 9px; font-weight: 700;
      color: var(--text3); padding: 2px 0 4px;
    }
    .cal-dh.sun { color: #EF4444; }
    .cal-dh.sat { color: #6366F1; }
    .cal-cell {
      display: flex; flex-direction: column; align-items: center;
      padding: 2px 0; border-radius: 4px;
      min-height: 26px; position: relative;
    }
    .cal-cell.has-todo { cursor: pointer; }
    .cal-cell.has-todo:hover { background: rgba(108,99,255,0.12); }
    .cal-cell.other-month { opacity: 0.28; }
    .cal-day {
      font-size: 10px; font-weight: 500; color: var(--text);
      line-height: 1; width: 17px; height: 17px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .cal-cell.today .cal-day {
      background: var(--primary); color: #fff;
      border-radius: 50%; font-weight: 700;
    }
    .cal-cell.sun-col .cal-day { color: #EF4444; }
    .cal-cell.today .cal-day { color: #fff !important; }
    .cal-cell.sat-col .cal-day { color: #6366F1; }
    .cal-dots { display: flex; gap: 2px; justify-content: center; margin-top: 1px; flex-wrap: wrap; }
    .cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
    .cal-dot-work     { background: var(--work); }
    .cal-dot-personal { background: var(--personal); }
    .cal-dot-study    { background: var(--study); }

    /* Stats */
    .sb-stat { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 11px; }
    .sb-stat:last-child { margin-bottom: 0; }
    .sb-stat-label { color: var(--text2); }
    .sb-stat-val { font-weight: 700; color: var(--text); }

    /* Bottom */
    .sb-bottom {
      padding: 10px 10px; border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 4px; flex-shrink: 0;
    }
    .sb-theme-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 9px;
      font-size: 12px; font-weight: 600; color: var(--text2);
      transition: all 0.15s; text-align: left;
    }
    .sb-theme-btn:hover { background: var(--surface2); color: var(--text); }
    .sb-ver { font-size: 10px; color: var(--text3); padding: 0 4px; }

    /* Main */
    .main { flex: 1; overflow-y: auto; padding: 36px 44px; background: var(--bg); }
    .page { display: none; }
    .page.active { display: block; }

    .page-hd {
      display: flex; align-items: flex-start;
      justify-content: space-between; flex-wrap: wrap;
      gap: 16px; margin-bottom: 28px;
    }
    .page-hd-left { display: flex; flex-direction: column; gap: 4px; }
    .page-title { font-size: 26px; font-weight: 700; }
    .page-sub { font-size: 13px; color: var(--text3); }
    .page-toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    .tb-input, .tb-select {
      padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--surface); color: var(--text); font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .tb-input { min-width: 220px; }
    .tb-input:focus, .tb-select:focus { border-color: var(--primary); }
    .btn-primary {
      padding: 9px 22px; background: var(--primary); color: #fff;
      border-radius: 9px; font-size: 14px; font-weight: 600;
      transition: background 0.2s; white-space: nowrap;
    }
    .btn-primary:hover { background: var(--primary-h); }

    /* Diary Grid */
    .diary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .empty-state { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--text3); line-height: 2.5; }
    .empty-state .empty-icon { font-size: 52px; display: block; margin-bottom: 8px; }
    .empty-state p { font-size: 15px; }

    .diary-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px; box-shadow: var(--shadow);
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .diary-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .card-mood { font-size: 26px; }
    .card-date { flex: 1; font-size: 13px; color: var(--text3); font-weight: 500; }
    .card-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
    .diary-card:hover .card-actions,
    .diary-card:focus-within .card-actions { opacity: 1; }
    .action-btn {
      width: 30px; height: 30px; border-radius: 8px; font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; color: var(--text3);
    }
    .action-btn:hover { background: var(--surface2); }
    .card-content {
      font-size: 14px; color: var(--text2); line-height: 1.75; margin-bottom: 12px;
      white-space: pre-wrap; display: -webkit-box; -webkit-line-clamp: 4;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-thanks { background: var(--surface2); border-radius: 9px; padding: 11px 14px; }
    .thanks-label { font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
    .card-thanks ul { padding-left: 14px; display: flex; flex-direction: column; gap: 4px; }
    .card-thanks li { font-size: 13px; color: var(--text2); list-style: disc; }

    /* Modal */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 20px; animation: fadeIn 0.15s ease;
    }
    .modal-bg.hidden { display: none; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-box {
      background: var(--surface); border-radius: 18px;
      width: 100%; max-width: 560px; max-height: 90vh;
      overflow-y: auto; box-shadow: var(--shadow-lg);
      border: 1px solid var(--border); animation: slideUp 0.2s ease;
    }
    @keyframes slideUp { from { transform: translateY(14px); opacity: 0; } to { transform: none; opacity: 1; } }
    .modal-hd {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--surface);
    }
    .modal-hd h3 { font-size: 17px; font-weight: 700; }
    .modal-close {
      width: 30px; height: 30px; border-radius: 8px; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text3); transition: background 0.15s;
    }
    .modal-close:hover { background: var(--surface2); }
    .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
    .form-row { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 13px; font-weight: 600; color: var(--text2); }
    .form-input, .form-textarea {
      padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--surface2); color: var(--text); font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--primary); }
    .form-textarea { resize: vertical; min-height: 150px; }
    .mood-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .mood-btn {
      width: 52px; height: 58px; border-radius: 9px;
      border: 2.5px solid transparent; transition: all 0.15s;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    }
    .mood-emoji { font-size: 22px; line-height: 1; }
    .mood-lbl   { font-size: 9px; color: var(--text3); font-weight: 600; line-height: 1; }
    .mood-btn:hover { background: var(--surface2); transform: scale(1.1); }
    .mood-btn:hover .mood-lbl { color: var(--text2); }
    .mood-btn.sel { border-color: var(--primary); background: var(--surface2); transform: scale(1.12); }
    .mood-btn.sel .mood-lbl { color: var(--primary); }
    .modal-foot {
      display: flex; gap: 10px; justify-content: flex-end;
      padding: 16px 24px; border-top: 1px solid var(--border);
    }
    .btn-cancel {
      padding: 9px 18px; border: 1.5px solid var(--border);
      border-radius: 9px; color: var(--text2); font-size: 14px; font-weight: 600;
      transition: background 0.15s;
    }
    .btn-cancel:hover { background: var(--surface2); }
    .btn-save {
      padding: 9px 22px; background: var(--primary); color: #fff;
      border-radius: 9px; font-size: 14px; font-weight: 600; transition: background 0.2s;
    }
    .btn-save:hover { background: var(--primary-h); }

    /* Todo Desktop Layout */
    .todo-layout { display: grid; grid-template-columns: 1fr 320px; gap: 28px; align-items: start; }
    .todo-main { display: flex; flex-direction: column; gap: 16px; }
    .todo-aside { position: sticky; top: 0; display: flex; flex-direction: column; gap: 16px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px; box-shadow: var(--shadow);
    }
    .card-label {
      font-size: 11px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px;
    }

    /* Progress */
    .prog-hd { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
    .prog-text { font-size: 20px; font-weight: 700; }
    .prog-pct  { font-size: 13px; color: var(--text3); }
    .prog-track { width: 100%; height: 10px; background: var(--border); border-radius: 999px; overflow: hidden; margin-bottom: 18px; }
    .prog-fill  { height: 100%; background: linear-gradient(90deg, var(--work), var(--study)); border-radius: 999px; transition: width 0.4s ease; }
    .prog-fill.done { background: var(--study); }
    .cat-rows { display: flex; flex-direction: column; gap: 13px; }
    .cat-row { display: flex; flex-direction: column; gap: 5px; }
    .cat-row-hd { display: flex; justify-content: space-between; align-items: center; }
    .cat-badge { font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 999px; color: #fff; }
    .c-work     { background: var(--work); }
    .c-personal { background: var(--personal); }
    .c-study    { background: var(--study); }
    .cat-cnt  { font-size: 11px; color: var(--text3); }
    .cat-track { width: 100%; height: 5px; background: var(--border); border-radius: 999px; overflow: hidden; }
    .cat-fill  { height: 100%; border-radius: 999px; transition: width 0.4s ease; }
    .cf-work     { background: var(--work); }
    .cf-personal { background: var(--personal); }
    .cf-study    { background: var(--study); }

    /* Todo Input */
    .todo-input-row { display: flex; gap: 8px; align-items: flex-start; }
    .todo-text-inp {
      flex: 1; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--surface2); color: var(--text); font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .todo-text-inp:focus { border-color: var(--work); }
    .todo-text-inp::placeholder { color: var(--text3); }
    .todo-text-inp.shake { border-color: #EF4444; animation: shake 0.4s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); } 40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); } 80% { transform: translateX(4px); }
    }
    .cat-sel-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .cat-select {
      padding: 10px; border: 1.5px solid var(--border); border-radius: 9px;
      background: var(--surface2); color: var(--text); font-size: 14px; outline: none; cursor: pointer;
    }
    .auto-badge { font-size: 10px; font-weight: 700; color: var(--study); white-space: nowrap; }
    .todo-add-btn {
      padding: 10px 18px; background: var(--work); color: #fff;
      border-radius: 9px; font-size: 14px; font-weight: 700;
      transition: background 0.2s; white-space: nowrap;
    }
    .todo-add-btn:hover { background: #3a6fd8; }

    /* Due date row */
    .todo-due-row {
      display: flex; align-items: center; gap: 8px;
      margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border);
    }
    .due-row-label { font-size: 12px; color: var(--text3); white-space: nowrap; flex-shrink: 0; }
    .due-date-inp {
      padding: 5px 10px; border: 1.5px solid var(--border); border-radius: 8px;
      background: var(--surface2); color: var(--text); font-size: 12px; outline: none;
      transition: border-color 0.2s; cursor: pointer;
    }
    .due-date-inp:focus { border-color: var(--work); }
    .due-clear-btn {
      font-size: 11px; color: var(--text3); padding: 4px 9px;
      border: 1.5px solid var(--border); border-radius: 6px; transition: all 0.15s;
    }
    .due-clear-btn:hover { border-color: #EF4444; color: #EF4444; }

    .kw-link {
      display: block; margin-top: 10px; text-align: right;
      font-size: 12px; color: var(--text3); transition: color 0.15s;
    }
    .kw-link:hover { color: var(--primary); }

    /* Filter tabs */
    .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn {
      padding: 7px 14px; border-radius: 999px; font-size: 13px; font-weight: 600;
      color: var(--text3); border: 1.5px solid var(--border);
      background: var(--surface); transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--work); color: var(--work); }
    .filter-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .filter-btn.f-work.active     { background: var(--work);     border-color: var(--work); }
    .filter-btn.f-personal.active { background: var(--personal); border-color: var(--personal); }
    .filter-btn.f-study.active    { background: var(--study);    border-color: var(--study); }

    /* Todo List */
    .todo-list { display: flex; flex-direction: column; gap: 10px; min-height: 60px; }
    .todo-empty { text-align: center; padding: 40px 0; color: var(--text3); font-size: 14px; }
    @keyframes fadeIn2 { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: none; } }
    .todo-item {
      display: flex; align-items: center; gap: 10px; padding: 12px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; box-shadow: var(--shadow);
      transition: box-shadow 0.15s, transform 0.15s; animation: fadeIn2 0.2s ease;
    }
    .todo-item:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .todo-item.done .item-text { text-decoration: line-through; opacity: 0.4; }
    .todo-chk { width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; accent-color: var(--primary); }
    .item-body { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .item-text { font-size: 14px; color: var(--text); line-height: 1.4; }
    .item-edit-inp {
      width: 100%; padding: 2px 8px; border: 1.5px solid var(--work); border-radius: 6px;
      font-size: 14px; color: var(--text); background: var(--surface2); outline: none;
    }
    .item-badge { font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 999px; color: #fff; flex-shrink: 0; }

    /* Due badge */
    .due-badge {
      font-size: 10px; font-weight: 600; padding: 1px 7px;
      border-radius: 999px; white-space: nowrap; align-self: flex-start;
    }
    .due-overdue { background: #FEE2E2; color: #EF4444; }
    .due-today   { background: #FEF3C7; color: #D97706; }
    .due-soon    { background: #FEF9C3; color: #CA8A04; }
    .due-future  { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }

    .btn-edit {
      padding: 3px 9px; border-radius: 6px; font-size: 12px; font-weight: 600;
      color: var(--text3); border: 1.5px solid var(--border);
      transition: all 0.15s; flex-shrink: 0;
    }
    .btn-edit:hover { border-color: var(--work); color: var(--work); }
    .btn-del {
      width: 26px; height: 26px; border-radius: 6px; font-size: 14px;
      color: var(--text3); display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .btn-del:hover { background: #FEE2E2; color: #EF4444; }

    /* Todo Footer */
    .todo-foot { display: flex; justify-content: space-between; align-items: center; }
    .btn-clear {
      padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 9px;
      font-size: 13px; font-weight: 600; color: var(--text3); transition: all 0.2s;
    }
    .btn-clear:hover:not(:disabled) { border-color: #EF4444; color: #EF4444; background: #FEE2E2; }
    .btn-clear:disabled { opacity: 0.4; cursor: not-allowed; }
    .todo-count { font-size: 13px; color: var(--text3); font-weight: 500; }

    /* Keyword Modal */
    .kw-modal-box { max-width: 460px; }
    .kw-body { padding: 16px 24px 24px; display: flex; flex-direction: column; gap: 22px; }
    .kw-section { display: flex; flex-direction: column; gap: 10px; }
    .kw-sec-hd { display: flex; align-items: center; gap: 10px; }
    .kw-default-note { font-size: 11px; color: var(--text3); }
    .kw-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .kw-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px 3px 10px; background: var(--primary); color: #fff;
      border-radius: 999px; font-size: 12px; font-weight: 600;
    }
    .kw-del { font-size: 15px; line-height: 1; opacity: 0.75; padding: 0 2px; transition: opacity 0.15s; }
    .kw-del:hover { opacity: 1; }
    .kw-add-row { display: flex; gap: 8px; }
    .kw-add-inp {
      flex: 1; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px;
      background: var(--surface2); color: var(--text); font-size: 13px; outline: none;
      transition: border-color 0.2s;
    }
    .kw-add-inp:focus { border-color: var(--primary); }
    .kw-add-work, .kw-add-personal, .kw-add-study {
      padding: 8px 14px; border-radius: 8px; font-size: 13px;
      font-weight: 700; white-space: nowrap; transition: opacity 0.15s; color: #fff;
    }
    .kw-add-work     { background: var(--work); }
    .kw-add-personal { background: var(--personal); }
    .kw-add-study    { background: var(--study); }
    .kw-add-work:hover, .kw-add-personal:hover, .kw-add-study:hover { opacity: 0.85; }

    /* Day Detail Modal */
    .day-modal-box { max-width: 400px; }
    .day-modal-body { padding: 14px 20px 20px; display: flex; flex-direction: column; gap: 8px; }
    .day-empty { text-align: center; padding: 24px; color: var(--text3); font-size: 13px; }
    .day-todo-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 10px;
    }
    .day-todo-item.done .day-todo-text { text-decoration: line-through; opacity: 0.45; }
    .day-todo-chk { width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; accent-color: var(--primary); }
    .day-todo-text { flex: 1; font-size: 13px; color: var(--text); }
  </style>
</head>
<body>
<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-brand">
      <span class="sb-logo">📔</span>

    <nav class="sb-nav">
      <button class="sb-btn active" onclick="switchPage('diary', this)">📔 일기</button>

    <div class="sb-divider"></div>

    <div class="sb-scroll">
      <!-- Clock -->
      <div class="sb-widget">
        <div class="sb-widget-title">현재 시간</div>

      <!-- Weather -->

        <div class="sb-widget-title">날씨</div>
        <div id="sb-weather"><span class="sb-weather-msg">불러오는 중...</span></div>
      </div>

      <!-- Calendar -->

      </div>

      <!-- Stats -->
      <div class="sb-widget">
        <div class="sb-widget-title">현황</div>

        <div class="sb-stat"><span class="sb-stat-label">할 일 완료율</span><span class="sb-stat-val" id="stat-todo">0%</span></div>
        <div class="sb-stat"><span class="sb-stat-label">오늘</span><span class="sb-stat-val" id="stat-date">-</span></div>

  <!-- MAIN -->
  <main class="main">

    <!-- DIARY PAGE -->
    <section id="page-diary" class="page active">
      <div class="page-hd">
        <div class="page-hd-left">
          <h2 class="page-title">나의 감사 일기</h2>
          <span class="page-sub" id="diary-sub">0개의 일기</span>
        </div>
        <div class="page-toolbar">
          <input class="tb-input" id="diary-search" type="text" placeholder="🔍 내용, 감사 검색..." oninput="filterDiary()">
          <select class="tb-select" id="mood-filter" onchange="filterDiary()">

    </section>

    <!-- TODO PAGE -->
    <section id="page-todo" class="page">
      <div class="page-hd">
        <div class="page-hd-left">
          <h2 class="page-title">할 일 관리</h2>
          <span class="page-sub" id="todo-date"></span>
        </div>
      </div>
      <div class="todo-layout">

        <div class="todo-main">
          <div class="card">
            <div class="todo-input-row">
              <input class="todo-text-inp" id="todo-inp" type="text"
                placeholder="새로운 할 일을 입력하세요"
                oninput="onTodoInput()"
                onkeydown="if(event.key==='Enter') addTodo()">
              <div class="cat-sel-wrap">
                <select class="cat-select" id="cat-sel" onchange="onCatManual()">
                  <option value="work">💼 업무</option>
                  <option value="personal">🙋 개인</option>
                  <option value="study">📚 공부</option>
                </select>
                <span class="auto-badge" id="auto-badge" style="visibility:hidden">✨ 자동</span>

            <div class="todo-due-row">
              <span class="due-row-label">📅 마감일</span>
              <input type="date" class="due-date-inp" id="todo-due">
              <button class="due-clear-btn" onclick="document.getElementById('todo-due').value=''">지우기</button>

<!-- DIARY FORM MODAL -->

<script>
  // ── Constants ──────────────────────────────────────────────────────────
  const MOODS = ['😊','😄','😐','😢','😡','😴','🥰','😰','🤩','😌']
  const MOOD_LABEL = {
    '😊':'행복', '😄':'신남', '😐':'보통', '😢':'슬픔', '😡':'화남',
    '😴':'피곤', '🥰':'사랑', '😰':'불안', '🤩':'설렘', '😌':'평온',
  }
  const CATS  = ['work','personal','study']
  const CAT_LABEL = { work:'업무', personal:'개인', study:'공부' }
  const CAT_ICON  = { work:'💼',  personal:'🙋',  study:'📚' }
  const DEFAULT_KW = {
    work:     ['회의','보고서','기획','발표','미팅','업무','출장','계약','프로젝트','거래처','이메일','제안서','검토','결재','예산','마감','클라이언트','고객','팀장','부장','사장','부서','영업','납기','견적','협의','회사'],
    personal: ['운동','병원','쇼핑','약속','청소','빨래','요리','친구','가족','여행','영화','산책','저녁','점심','아침','약','헬스','미용실','장보기','집안일','데이트','모임','생일','결혼식','청첩장'],
    study:    ['공부','강의','독서','책','시험','과제','학원','수업','인강','복습','예습','자격증','토익','영어','프로그래밍','코딩','강좌','논문','학습','스터디','튜토리얼','문제풀이','강습'],
  }

  // ── State ──────────────────────────────────────────────────────────────
  let diaries      = []
  let todos        = []
  let customKw     = { work:[], personal:[], study:[] }
  let diarySearch  = ''
  let moodFilter   = ''
  let todoFilter   = 'all'
  let editDiaryId  = null
  let editTodoId   = null
  let selMood      = ''
  let userOverrode = false
  let dark         = false
  let calYear      = new Date().getFullYear()
  let calMonth     = new Date().getMonth()
  let dayDetailDate = null

  // ── Persistence ────────────────────────────────────────────────────────
  function loadState() {
    try { diaries  = JSON.parse(localStorage.getItem('web_diary_entries') || '[]') } catch {}
    try { const d = JSON.parse(localStorage.getItem('todo_app_data')); if (Array.isArray(d?.todos)) todos = d.todos } catch {}
    try { const d = JSON.parse(localStorage.getItem('todo_keywords'));  if (d && CATS.every(c=>Array.isArray(d[c]))) customKw = d } catch {}
    dark = localStorage.getItem('theme') === 'dark'
  }
  function saveDiaries() { localStorage.setItem('web_diary_entries', JSON.stringify(diaries)) }
  function saveTodos()   { localStorage.setItem('todo_app_data', JSON.stringify({ todos })); updateSbStats() }
  function saveKw()      { localStorage.setItem('todo_keywords', JSON.stringify(customKw)) }

  // ── Util ───────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }
  function escBr(s) { return esc(s).replace(/\n/g,'<br>') }

  function localDateStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
  }

  function fmtDue(dueDate) {
    if (!dueDate) return null
    const today = new Date(); today.setHours(0,0,0,0)
    const due   = new Date(dueDate + 'T00:00:00')
    const diff  = Math.round((due - today) / 86400000)
    const label = `${due.getMonth()+1}/${due.getDate()}`
    if (diff < 0)  return { text: `${label} 지남`, cls: 'due-overdue' }
    if (diff === 0) return { text: '오늘 마감',    cls: 'due-today'   }
    if (diff === 1) return { text: '내일 마감',    cls: 'due-soon'    }
    if (diff <= 7)  return { text: `${label}`,     cls: 'due-soon'    }
    return { text: label, cls: 'due-future' }
  }

  // ── Init ───────────────────────────────────────────────────────────────
  loadState()
  document.addEventListener('DOMContentLoaded', () => {
    if (dark) document.documentElement.classList.add('dark')
    updateThemeBtn()
    initMoodFilter()
    initMoodGrid()
    renderDiaryPage()
    renderTodoPage()
    updateSbStats()

    const now = new Date()
    document.getElementById('todo-date').textContent =
      now.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' })
    document.getElementById('stat-date').textContent =
      now.toLocaleDateString('ko-KR', { month:'long', day:'numeric' })

    updateClock()
    setInterval(updateClock, 1000)
    fetchWeather()
    setInterval(fetchWeather, 30 * 60 * 1000)
    renderCalendar()
  })

  // ── Theme ──────────────────────────────────────────────────────────────
  function toggleTheme() {
    dark = !dark
    document.documentElement.classList.toggle('dark', dark)
    localStorage.setItem('theme', dark ? 'dark' : 'light')
    updateThemeBtn()
  }
  function updateThemeBtn() {
    document.getElementById('theme-btn').textContent = dark ? '☀️ 라이트 모드' : '🌙 다크 모드'
  }

  // ── Navigation ─────────────────────────────────────────────────────────
  function switchPage(p, btn) {
    document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    document.querySelectorAll('.page').forEach(s => s.classList.remove('active'))
    document.getElementById('page-' + p).classList.add('active')
  }

  // ── Sidebar Stats ──────────────────────────────────────────────────────
  function updateSbStats() {
    document.getElementById('stat-diary').textContent = diaries.length + '개'
    const done = todos.filter(t => t.completed).length
    const pct  = todos.length === 0 ? 0 : Math.round(done / todos.length * 100)
    document.getElementById('stat-todo').textContent = pct + '%'
  }

  // ── Clock ──────────────────────────────────────────────────────────────
  function updateClock() {
    const now = new Date()
    document.getElementById('sb-clock').textContent =
      now.toLocaleTimeString('ko-KR', { hour12: false })
    document.getElementById('sb-clock-date').textContent =
      now.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' })
  }

  // ── Weather ────────────────────────────────────────────────────────────
  async function fetchWeather() {
    const el = document.getElementById('sb-weather')
    try {
      const res  = await fetch('https://wttr.in/?format=j1')
      const data = await res.json()
      const cc   = data.current_condition[0]
      const area = data.nearest_area[0]
      const temp = cc.temp_C
      const code = parseInt(cc.weatherCode)
      const desc = cc.weatherDesc[0].value
      const city = area.areaName[0].value
      const icon = weatherEmoji(code)
      el.innerHTML = `
        <div class="sb-weather-row">
          <span class="sb-weather-icon">${icon}</span>
          <div class="sb-weather-info">
            <span class="sb-weather-temp">${temp}°C</span>
            <span class="sb-weather-desc">${translateWeather(desc)}</span>
          </div>
        </div>
        <div class="sb-weather-loc">📍 ${esc(city)}</div>`
    } catch {
      el.innerHTML = '<span class="sb-weather-msg">날씨 정보 없음</span>'
    }
  }

  function weatherEmoji(code) {
    if (code === 113) return '☀️'
    if (code === 116) return '⛅'
    if ([119,122].includes(code)) return '☁️'
    if ([143,248,260].includes(code)) return '🌫️'
    if ([200,386,389,392,395].includes(code)) return '⛈️'
    if ([179,182,185,227,230,323,326,329,332,335,338,350,362,365,368,371,374,377].includes(code)) return '❄️'
    return '🌧️'
  }

  function translateWeather(desc) {
    const m = {
      'Sunny':'맑음','Clear':'맑음','Partly cloudy':'구름 조금','Partly Cloudy':'구름 조금',
      'Cloudy':'흐림','Overcast':'흐림','Mist':'안개','Fog':'안개',
      'Light rain':'가벼운 비','Moderate rain':'비','Heavy rain':'강한 비',
      'Light drizzle':'이슬비','Heavy drizzle':'이슬비','Freezing drizzle':'이슬비',
      'Light snow':'가벼운 눈','Moderate snow':'눈','Heavy snow':'강한 눈','Blizzard':'눈보라',
      'Patchy rain possible':'비 가능','Patchy snow possible':'눈 가능',
      'Thundery outbreaks possible':'천둥번개','Blowing snow':'눈보라',
    }
    return m[desc] || desc
  }

  // ── Calendar ───────────────────────────────────────────────────────────
  function renderCalendar() {
    const todayStr  = localDateStr(new Date())
    const firstDay  = new Date(calYear, calMonth, 1)
    const lastDay   = new Date(calYear, calMonth + 1, 0)
    const startDow  = firstDay.getDay()  // 0=Sun
    const daysInMon = lastDay.getDate()

    const todosByDate = {}
    todos.forEach(t => {
      if (t.dueDate) {
        if (!todosByDate[t.dueDate]) todosByDate[t.dueDate] = []
        todosByDate[t.dueDate].push(t)
      }
    })

    const cells = []
    // Leading prev-month days
    for (let i = 0; i < startDow; i++) {
      const prevLast = new Date(calYear, calMonth, 0)
      const d   = prevLast.getDate() - startDow + 1 + i
      const py  = calMonth === 0 ? calYear - 1 : calYear
      const pm  = calMonth === 0 ? 11 : calMonth - 1
      cells.push({ day: d, dateStr: `${py}-${String(pm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`, other: true })
    }
    // Current month
    for (let d = 1; d <= daysInMon; d++) {
      const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
      cells.push({ day: d, dateStr: ds, other: false, todos: todosByDate[ds] || [] })
    }
    // Trailing next-month days
    const rem = cells.length % 7 === 0 ? 0 : 7 - (cells.length % 7)
    for (let i = 1; i <= rem; i++) {
      const ny = calMonth === 11 ? calYear + 1 : calYear
      const nm = calMonth === 11 ? 0 : calMonth + 1
      cells.push({ day: i, dateStr: `${ny}-${String(nm+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`, other: true })
    }

    const DOW = ['일','월','화','수','목','금','토']
    const headers = DOW.map((d,i) =>
      `<div class="cal-dh${i===0?' sun':i===6?' sat':''}">${d}</div>`
    ).join('')

    const cellsHtml = cells.map((c, i) => {
      const col      = i % 7
      const isToday  = !c.other && c.dateStr === todayStr
      const hasTodos = !c.other && c.todos && c.todos.length > 0
      const classes  = [
        'cal-cell',
        c.other ? 'other-month' : '',
        isToday  ? 'today'      : '',
        col === 0 ? 'sun-col'   : '',
        col === 6 ? 'sat-col'   : '',
        hasTodos ? 'has-todo'   : '',
      ].filter(Boolean).join(' ')
      const dots = hasTodos
        ? c.todos.slice(0,3).map(t => `<span class="cal-dot cal-dot-${t.category}"></span>`).join('')
        : ''
      const click = hasTodos ? `onclick="showDayDetail('${c.dateStr}')"` : ''
      return `
        <div class="${classes}" ${click}>
          <span class="cal-day">${c.day}</span>
          ${dots ? `<div class="cal-dots">${dots}</div>` : ''}
        </div>`
    }).join('')

    document.getElementById('sb-cal').innerHTML = `
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="prevMonth()">‹</button>
        <span class="cal-month-lbl">${calYear}년 ${calMonth+1}월</span>
        <button class="cal-nav-btn" onclick="nextMonth()">›</button>
      </div>
      <div class="cal-grid">${headers}${cellsHtml}</div>`
  }

  function prevMonth() {
    calMonth--; if (calMonth < 0) { calMonth = 11; calYear-- }
    renderCalendar()
  }
  function nextMonth() {
    calMonth++; if (calMonth > 11) { calMonth = 0; calYear++ }
    renderCalendar()
  }

  // ── Day Detail ─────────────────────────────────────────────────────────
  function showDayDetail(dateStr) {
    dayDetailDate = dateStr
    const d = new Date(dateStr + 'T00:00:00')
    document.getElementById('day-modal-title').textContent =
      d.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' })
    refreshDayDetail()
    document.getElementById('day-modal').classList.remove('hidden')
  }

  function refreshDayDetail() {
    const dayTodos = todos.filter(t => t.dueDate === dayDetailDate)
    const body = document.getElementById('day-modal-body')
    if (!dayTodos.length) {
      body.innerHTML = '<p class="day-empty">이 날짜에 등록된 할 일이 없습니다.</p>'
      return
    }
    body.innerHTML = dayTodos.map(t => `
      <div class="day-todo-item${t.completed ? ' done' : ''}">
        <input type="checkbox" class="day-todo-chk" ${t.completed ? 'checked' : ''}
          onchange="toggleTodoFromDay('${t.id}')">
        <span class="day-todo-text">${esc(t.text)}</span>
        <span class="item-badge c-${t.category}">${CAT_LABEL[t.category]}</span>
      </div>`).join('')
  }

  function closeDayDetail() {
    document.getElementById('day-modal').classList.add('hidden')
    dayDetailDate = null
  }

  function toggleTodoFromDay(id) {
    todos = todos.map(t => t.id === id ? {...t, completed: !t.completed} : t)
    saveTodos()
    renderTodoPage()
    renderCalendar()
    if (dayDetailDate) refreshDayDetail()
  }

  // ── DIARY ──────────────────────────────────────────────────────────────
  function initMoodFilter() {
    const sel = document.getElementById('mood-filter')
    MOODS.forEach(m => {
      const o = document.createElement('option')
      o.value = m
      o.textContent = `${m} ${MOOD_LABEL[m] || ''}`
      sel.appendChild(o)
    })
  }
  function initMoodGrid() {
    document.getElementById('mood-grid').innerHTML =
      MOODS.map(m => `
        <button class="mood-btn" data-mood="${m}" onclick="selectMood('${m}',this)">
          <span class="mood-emoji">${m}</span>
          <span class="mood-lbl">${MOOD_LABEL[m] || ''}</span>
        </button>`).join('')
  }
  function selectMood(m, btn) {
    selMood = m
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('sel'))
    btn.classList.add('sel')
  }
  function filterDiary() {
    diarySearch = document.getElementById('diary-search').value.toLowerCase()
    moodFilter  = document.getElementById('mood-filter').value
    renderDiaryPage()
  }
  function renderDiaryPage() {
    const filtered = diaries.filter(e => {
      const okMood   = !moodFilter  || e.mood === moodFilter
      const okSearch = !diarySearch ||
        e.content?.toLowerCase().includes(diarySearch) ||
        e.thanks?.some(t => t?.toLowerCase().includes(diarySearch))
      return okMood && okSearch
    }).sort((a,b) => b.date > a.date ? 1 : -1)

    document.getElementById('diary-sub').textContent = `총 ${diaries.length}개의 일기`
    const grid = document.getElementById('diary-grid')
    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state"><span class="empty-icon">📖</span><p>일기가 없습니다.</p><p>오늘의 감사한 일을 기록해보세요!</p></div>`
      return
    }
    grid.innerHTML = filtered.map(e => `
      <div class="diary-card">
        <div class="card-top">
          <span class="card-mood">${e.mood || '📔'}</span>
          <span class="card-date">${e.date}</span>
          <div class="card-actions">
            <button class="action-btn" onclick="openDiaryForm('${e.id}')">✏️</button>
            <button class="action-btn" onclick="delDiary('${e.id}')">🗑</button>
          </div>
        </div>
        ${e.content ? `<p class="card-content">${escBr(e.content)}</p>` : ''}
        ${e.thanks?.some(t=>t) ? `
          <div class="card-thanks">
            <p class="thanks-label">✨ 감사한 일</p>
            <ul>${e.thanks.filter(t=>t).map(t=>`<li>${esc(t)}</li>`).join('')}</ul>
          </div>` : ''}
      </div>`).join('')
  }
  function openDiaryForm(id = null) {
    editDiaryId = id
    const e = id ? diaries.find(d=>d.id===id) : null
    document.getElementById('form-title').textContent = id ? '일기 수정' : '새 일기'
    document.getElementById('f-date').value    = e?.date    || localDateStr(new Date())
    document.getElementById('f-content').value = e?.content || ''
    const thanks = e?.thanks || ['','','']
    ;[0,1,2].forEach(i => document.getElementById('f-t'+i).value = thanks[i]||'')
    selMood = e?.mood || ''
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.toggle('sel', b.dataset.mood === selMood))
    document.getElementById('diary-modal').classList.remove('hidden')
  }
  function closeDiaryForm() {
    document.getElementById('diary-modal').classList.add('hidden')
    editDiaryId = null
  }
  function saveDiary() {
    const date    = document.getElementById('f-date').value
    const content = document.getElementById('f-content').value.trim()
    const thanks  = [0,1,2].map(i => document.getElementById('f-t'+i).value.trim())
    if (!date) return
    if (editDiaryId) {
      diaries = diaries.map(e => e.id===editDiaryId ? {...e, date, content, thanks, mood:selMood} : e)
    } else {
      diaries.push({ id:crypto.randomUUID(), date, content, thanks, mood:selMood, createdAt:Date.now() })
    }
    saveDiaries(); renderDiaryPage(); updateSbStats(); closeDiaryForm()
  }
  function delDiary(id) {
    if (!confirm('정말 삭제하시겠습니까?')) return
    diaries = diaries.filter(e => e.id !== id)
    saveDiaries(); renderDiaryPage(); updateSbStats()
  }

  // ── TODO ───────────────────────────────────────────────────────────────
  function detectCat(text) {
    for (const cat of CATS) {
      const all = [...DEFAULT_KW[cat], ...(customKw[cat]||[])]
      if (all.some(kw => text.includes(kw))) return cat
    }
    return null
  }
  function onTodoInput() {
    if (userOverrode) return
    const det   = detectCat(document.getElementById('todo-inp').value)
    const badge = document.getElementById('auto-badge')
    if (det) { document.getElementById('cat-sel').value = det; badge.style.visibility = 'visible' }
    else     { badge.style.visibility = 'hidden' }
  }
  function onCatManual() {
    userOverrode = true
    document.getElementById('auto-badge').style.visibility = 'hidden'
  }
  function addTodo() {
    const inp  = document.getElementById('todo-inp')
    const text = inp.value.trim()
    if (!text) {
      inp.classList.add('shake'); inp.focus()
      setTimeout(() => inp.classList.remove('shake'), 500)
      return
    }
    const dueDate = document.getElementById('todo-due').value || null
    todos.push({
      id: crypto.randomUUID(), text,
      category: document.getElementById('cat-sel').value,
      completed: false, createdAt: Date.now(), dueDate
    })
    inp.value = ''
    document.getElementById('todo-due').value = ''
    document.getElementById('auto-badge').style.visibility = 'hidden'
    userOverrode = false
    inp.focus()
    saveTodos(); renderTodoPage(); renderCalendar()
  }
  function toggleTodo(id) {
    todos = todos.map(t => t.id===id ? {...t, completed:!t.completed} : t)
    saveTodos(); renderTodoPage(); renderCalendar()
  }
  function delTodo(id) {
    todos = todos.filter(t => t.id!==id)
    saveTodos(); renderTodoPage(); renderCalendar()
  }
  function startEdit(id) {
    editTodoId = id; renderTodoPage()
    const inp = document.getElementById('ei-'+id)
    if (inp) { inp.focus(); inp.select() }
  }
  function commitEdit(id) {
    const inp = document.getElementById('ei-'+id)
    if (inp?.value.trim()) todos = todos.map(t => t.id===id ? {...t, text:inp.value.trim()} : t)
    editTodoId = null; saveTodos(); renderTodoPage()
  }
  function cancelEdit() { editTodoId = null; renderTodoPage() }
  function clearDone() {
    todos = todos.filter(t => !t.completed)
    saveTodos(); renderTodoPage(); renderCalendar()
  }
  function setFilter(f, btn) {
    todoFilter = f
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    renderTodoPage()
  }
  function renderTodoPage() {
    const filtered = todoFilter==='all' ? todos : todos.filter(t=>t.category===todoFilter)
    const total    = todos.length
    const done     = todos.filter(t=>t.completed).length
    const pct      = total===0 ? 0 : Math.round(done/total*100)
    const hasDone  = todos.some(t=>t.completed)

    document.getElementById('prog-text').textContent = `${done} / ${total} 완료`
    document.getElementById('prog-pct').textContent  = `${pct}%`
    const pf = document.getElementById('prog-fill')
    pf.style.width = pct + '%'
    pf.className   = 'prog-fill' + (pct===100 ? ' done' : '')

    CATS.forEach(cat => {
      const ct = todos.filter(t=>t.category===cat)
      const cd = ct.filter(t=>t.completed).length
      const cp = ct.length===0 ? 0 : Math.round(cd/ct.length*100)
      document.getElementById('cf-'+cat).style.width   = cp + '%'
      document.getElementById('cc-'+cat).textContent   = ct.length===0 ? '항목 없음' : `${cd}/${ct.length}`
    })

    document.getElementById('todo-count').textContent = (todoFilter==='all' ? '총' : CAT_LABEL[todoFilter]) + ` ${filtered.length}개`
    document.getElementById('btn-clear').disabled = !hasDone

    const list = document.getElementById('todo-list')
    if (!filtered.length) {
      list.innerHTML = '<li class="todo-empty">할 일이 없습니다. 새 항목을 추가해보세요!</li>'
      return
    }
    list.innerHTML = filtered.map(t => {
      const due = fmtDue(t.dueDate)
      return `
        <li class="todo-item${t.completed?' done':''}">
          <input type="checkbox" class="todo-chk" ${t.completed?'checked':''} onchange="toggleTodo('${t.id}')">
          <div class="item-body">
            ${editTodoId===t.id
              ? `<input id="ei-${t.id}" class="item-edit-inp" value="${esc(t.text)}"
                   onkeydown="if(event.key==='Enter')commitEdit('${t.id}');if(event.key==='Escape')cancelEdit()"
                   onblur="commitEdit('${t.id}')">`
              : `<span class="item-text">${esc(t.text)}</span>`
            }
            ${due ? `<span class="due-badge ${due.cls}">📅 ${due.text}</span>` : ''}
          </div>
          <span class="item-badge c-${t.category}">${CAT_LABEL[t.category]}</span>
          <button class="btn-edit" onclick="startEdit('${t.id}')">수정</button>
          <button class="btn-del"  onclick="delTodo('${t.id}')">🗑</button>
        </li>`
    }).join('')
  }

  // ── KEYWORD MODAL ──────────────────────────────────────────────────────
  function openKwModal()  { renderKwModal(); document.getElementById('kw-modal').classList.remove('hidden') }
  function closeKwModal() { document.getElementById('kw-modal').classList.add('hidden') }
  function renderKwModal() {
    document.getElementById('kw-body').innerHTML = CATS.map(cat => `
      <div class="kw-section">
        <div class="kw-sec-hd">
          <span class="cat-badge c-${cat}">${CAT_ICON[cat]} ${CAT_LABEL[cat]}</span>
          <span class="kw-default-note">기본 ${DEFAULT_KW[cat].length}개 포함</span>
        </div>
        ${customKw[cat].length > 0 ? `
          <div class="kw-chips">
            ${customKw[cat].map(kw => `
              <span class="kw-chip">${esc(kw)}
                <button class="kw-del" data-cat="${cat}" data-kw="${esc(kw)}" onclick="removeKw(this)">×</button>
              </span>`).join('')}
          </div>` : ''}
        <div class="kw-add-row">
          <input class="kw-add-inp" id="kwi-${cat}" type="text" placeholder="새 키워드 입력"
            onkeydown="if(event.key==='Enter')addKw('${cat}')">
          <button class="kw-add-${cat}" onclick="addKw('${cat}')">+ 추가</button>
        </div>
      </div>`).join('')
  }
  function addKw(cat) {
    const inp = document.getElementById('kwi-'+cat)
    const kw  = inp.value.trim()
    if (!kw || DEFAULT_KW[cat].includes(kw) || customKw[cat].includes(kw)) { inp.value=''; return }
    customKw[cat] = [...customKw[cat], kw]
    inp.value = ''
    saveKw(); renderKwModal()
  }
  function removeKw(btn) {
    const { cat, kw } = btn.dataset
    customKw[cat] = customKw[cat].filter(k => k !== kw)
    saveKw(); renderKwModal()
  }

  // ── Keyboard shortcuts ─────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    const tag = document.activeElement.tagName
    const inInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT'
    const anyModalOpen = !document.getElementById('diary-modal').classList.contains('hidden') ||
                         !document.getElementById('kw-modal').classList.contains('hidden') ||
                         !document.getElementById('day-modal').classList.contains('hidden')

    // Escape: 열린 모달 닫기
    if (e.key === 'Escape') {
      if (!document.getElementById('diary-modal').classList.contains('hidden')) { closeDiaryForm(); return }
      if (!document.getElementById('kw-modal').classList.contains('hidden'))    { closeKwModal();  return }
      if (!document.getElementById('day-modal').classList.contains('hidden'))   { closeDayDetail(); return }
    }

    if (inInput || anyModalOpen) return

    // Ctrl+1: 일기 탭
    if (e.ctrlKey && e.key === '1') {
      e.preventDefault()
      const btn = document.querySelector('.sb-btn')
      switchPage('diary', btn)
    }
    // Ctrl+2: 할 일 탭
    if (e.ctrlKey && e.key === '2') {
      e.preventDefault()
      const btn = document.querySelectorAll('.sb-btn')[1]
      switchPage('todo', btn)
    }
    // Ctrl+N: 현재 탭에서 새 항목
    if (e.ctrlKey && e.key === 'n') {
      e.preventDefault()
      const todoActive = document.getElementById('page-todo').classList.contains('active')
      if (todoActive) {
        document.getElementById('todo-inp').focus()
      } else {
        openDiaryForm()
      }
    }
  })
</script>
</body>
</html>
